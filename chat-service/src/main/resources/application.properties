spring.application.name=chat-service
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/s7_messaging}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:s7_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:s7_password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.delivery.timeout.ms=5000
spring.kafka.producer.properties.request.timeout.ms=3000
spring.kafka.producer.properties.max.block.ms=3000
